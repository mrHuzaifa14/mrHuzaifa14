name: Contribution Snake

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'

jobs:
  generate-snake:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Run snake generator
        env:
          SNAKE_NAME: ${{ secrets.SNAKE_NAME }}
          SNAKE_EMAIL: ${{ secrets.SNAKE_EMAIL }}
          START_DATE: ${{ secrets.SNAKE_START_DATE }}
        run: |
          python tools/generate_snake.py

      - name: Push commits
        run: |
          BRANCH=${GITHUB_REF#refs/heads/}
          git push origin HEAD:$BRANCH
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#7C3AED&color_dots=#ebedf0,#9be9a8,#40c463,#30a14e,#216e39
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#A855F7&color_dots=#161b22,#0e4429,#006d32,#26a641,#39d353
            dist/github-contribution-grid-snake.gif?palette=github-dark&color_snake=#A855F7&color_dots=#161b22,#0e4429,#006d32,#26a641,#39d353&color_background=#0d1117

      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
